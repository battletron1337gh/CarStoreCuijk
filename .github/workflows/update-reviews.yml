# GitHub Actions Workflow: Automatische Reviews Update
# Dit script draait dagelijks om reviews te verversen
# ===========================================

name: Update Reviews Cache

on:
  schedule:
    # Dagelijks om 03:00 UTC (05:00 Nederlandse tijd)
    - cron: '0 3 * * *'
  workflow_dispatch: # Handmatige trigger mogelijk

jobs:
  update-reviews:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

